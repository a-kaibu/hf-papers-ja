services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    command:
      - -hf
      - "${LLAMA_CPP_HF_MODEL:-bartowski/google_gemma-4-E4B-it-GGUF:Q4_K_M}"
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "4096"

volumes:
  huggingface-cache:
