name: Run

on:
  schedule:
    - cron: "0 20 * * *" # 日本時間 05:00
  workflow_dispatch:

env:
  LLAMA_CPP_HF_MODEL: bartowski/google_gemma-4-E4B-it-GGUF:Q4_K_M

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Download llama.cpp
        run: |
          gh release download b8967 \
            --repo ggml-org/llama.cpp \
            --pattern 'llama-*-bin-ubuntu-x64.tar.gz' \
            --dir /tmp
          mkdir -p /tmp/llama.cpp
          tar -xvf /tmp/llama-*-bin-ubuntu-x64.tar.gz -C /tmp/llama.cpp --strip-components=1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache Hugging Face models
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/huggingface
          key: hf-${{ env.LLAMA_CPP_HF_MODEL }}

      - name: Start llama-server
        run: |
          /tmp/llama.cpp/llama-server \
            -hf "${{ env.LLAMA_CPP_HF_MODEL }}" \
            --host 127.0.0.1 \
            --port 8080 \
            --ctx-size 4096 &

          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 5
          done

          echo "llama-server did not become healthy" >&2
          exit 1

      - name: Run
        run: go run .

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web
        run: pnpm install && pnpm run build
        working-directory: web

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./public

      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
